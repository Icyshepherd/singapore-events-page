<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SG Events</title>
  <style>
    :root {
      --brand: #bf261d;
      --brand-dark: #9f1d16;
      --page: #f5f2ee;
      --surface: rgba(255, 255, 255, 0.98);
      --text: #262626;
      --muted: #666;
      --line: rgba(36, 36, 36, 0.16);
      --chip: #ececee;
      --chip-text: #333;
      --tag: #a8a8aa;
      --success: #87ca6b;
      --danger: #c7362d;
      --shadow: 0 10px 28px rgba(42, 32, 24, 0.14);
      --card-shadow: 0 6px 16px rgba(42, 32, 24, 0.16);
      --radius-xl: 28px;
      --radius-lg: 24px;
      --radius-md: 18px;
      --max-width: 1200px;
      font-family: "Segoe UI", "Helvetica Neue", Arial, sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(191, 38, 29, 0.06), transparent 24%),
        linear-gradient(180deg, #faf7f4 0%, var(--page) 28%, #f1ede9 100%);
    }

    button,
    input {
      font: inherit;
    }

    .page-shell {
      min-height: 100vh;
    }

    .hero {
      background: linear-gradient(180deg, var(--brand) 0%, #bb251c 100%);
      color: #fff;
      box-shadow: var(--shadow);
    }

    .hero-inner {
      max-width: var(--max-width);
      margin: 0 auto;
      padding: 42px 28px 68px;
      display: flex;
      gap: 24px;
      align-items: center;
      justify-content: space-between;
    }

    .brand {
      margin: 0;
      font-size: clamp(3rem, 6vw, 5rem);
      font-weight: 900;
      line-height: 0.96;
      letter-spacing: -0.06em;
    }

    .search-bar {
      width: min(100%, 670px);
      flex: 0 1 620px;
      display: flex;
      align-items: center;
      background: rgba(255, 255, 255, 0.98);
      border-radius: 999px;
      border: 3px solid rgba(255, 255, 255, 0.42);
      overflow: hidden;
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.7);
    }

    .search-input {
      flex: 1;
      min-width: 0;
      border: 0;
      outline: none;
      padding: 18px 24px;
      background: transparent;
      color: #516070;
      font-size: 1rem;
    }

    .search-button {
      border: 0;
      margin: 7px;
      padding: 13px 24px;
      border-radius: 999px;
      background: var(--brand);
      color: #fff;
      cursor: pointer;
      transition: background 0.18s ease, transform 0.18s ease;
    }

    .search-button:hover,
    .search-button:focus-visible {
      background: var(--brand-dark);
      transform: translateY(-1px);
    }

    .content-wrap {
      max-width: var(--max-width);
      margin: -34px auto 0;
      padding: 0 18px 40px;
    }

    .toolbar {
      position: sticky;
      top: 12px;
      z-index: 10;
      background: rgba(255, 255, 255, 0.93);
      border-radius: var(--radius-xl);
      padding: 24px 28px 20px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(10px);
    }

    .filters-row {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 26px;
      margin-bottom: 18px;
    }

    .multi-select {
      position: relative;
    }

    .multi-select.is-open .multi-select-panel {
      display: block;
    }

    .multi-select-trigger {
      width: 100%;
      min-height: 74px;
      border: 2px solid #2d2d2d;
      border-radius: 24px;
      padding: 14px 60px 14px 14px;
      background: #fff;
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      cursor: pointer;
      text-align: left;
      position: relative;
    }

    .multi-select-trigger::after {
      content: "";
      position: absolute;
      right: 22px;
      top: 50%;
      width: 0;
      height: 0;
      border-left: 11px solid transparent;
      border-right: 11px solid transparent;
      border-top: 12px solid #b8b8b8;
      transform: translateY(-25%);
      transition: transform 0.18s ease;
    }

    .multi-select.is-open .multi-select-trigger::after {
      transform: translateY(-60%) rotate(180deg);
    }

    .multi-select-placeholder {
      color: #727272;
      font-size: 1.15rem;
      padding-left: 8px;
    }

    .selected-chip {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      max-width: calc(100% - 8px);
      border-radius: 999px;
      background: var(--chip);
      color: var(--chip-text);
      padding: 7px 10px 7px 14px;
      line-height: 1;
      font-size: 0.95rem;
    }

    .selected-chip button {
      border: 0;
      background: transparent;
      color: #666;
      cursor: pointer;
      padding: 0;
      line-height: 1;
      font-size: 1rem;
    }

    .multi-select-panel {
      display: none;
      position: absolute;
      inset: calc(100% + 8px) 0 auto;
      max-height: 320px;
      overflow: auto;
      background: #fff;
      border: 1px solid rgba(45, 45, 45, 0.14);
      border-radius: 24px;
      padding: 12px;
      box-shadow: var(--shadow);
    }

    .option-list {
      display: grid;
      gap: 4px;
    }

    .option-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 12px;
      border-radius: 14px;
      cursor: pointer;
      transition: background 0.16s ease;
    }

    .option-item:hover,
    .option-item:focus-within {
      background: rgba(191, 38, 29, 0.06);
    }

    .option-item input {
      accent-color: var(--brand);
      width: 16px;
      height: 16px;
      margin: 0;
      flex: 0 0 auto;
    }

    .option-label {
      flex: 1;
      min-width: 0;
      color: #3f3f3f;
    }

    .option-count {
      color: #8a8a8a;
      font-size: 0.9rem;
      white-space: nowrap;
    }

    .date-strip {
      display: grid;
      grid-template-columns: auto auto auto 1fr auto;
      align-items: stretch;
      gap: 0;
      border-radius: 24px;
      overflow: hidden;
      border: 1px solid rgba(40, 40, 40, 0.08);
      background: #fff;
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.7);
    }

    .calendar-button,
    .browse-all-button {
      display: flex;
      align-items: center;
      gap: 14px;
      min-width: 162px;
      border: 0;
      border-right: 1px solid rgba(40, 40, 40, 0.1);
      background: #fff;
      padding: 22px 18px;
      cursor: pointer;
      color: var(--text);
    }

    .browse-all-button {
      min-width: 138px;
      justify-content: center;
      color: #4d4d4d;
      font-size: 1rem;
      font-weight: 600;
    }

    .browse-all-button.active {
      background: var(--brand);
      color: #fff;
    }

    .calendar-icon {
      width: 46px;
      height: 46px;
      flex: 0 0 auto;
    }

    .calendar-button span {
      color: #4d4d4d;
      font-size: 0.94rem;
      line-height: 1.05;
      text-align: left;
    }

    .date-nav {
      width: 58px;
      border: 0;
      background: #fff;
      color: #c9c9c9;
      cursor: pointer;
      font-size: 2.4rem;
      transition: color 0.18s ease, background 0.18s ease;
    }

    .date-nav:hover,
    .date-nav:focus-visible {
      color: var(--brand);
      background: rgba(191, 38, 29, 0.05);
    }

    .date-track {
      display: grid;
      grid-auto-flow: column;
      grid-auto-columns: minmax(122px, 1fr);
      overflow-x: auto;
      scrollbar-width: none;
      background: #fff;
    }

    .date-track::-webkit-scrollbar {
      display: none;
    }

    .date-pill {
      border: 0;
      border-left: 1px solid rgba(40, 40, 40, 0.15);
      background: #fff;
      min-height: 124px;
      padding: 16px 10px 14px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 6px;
      cursor: pointer;
      color: #565656;
      transition: background 0.18s ease, color 0.18s ease;
    }

    .date-pill:first-child {
      border-left: 0;
    }

    .date-pill .weekday {
      font-size: 1rem;
      line-height: 1.05;
      white-space: nowrap;
    }

    .date-pill .day-text {
      font-size: 1.2rem;
      line-height: 1.12;
      font-weight: 500;
    }

    .date-pill.active {
      background: var(--brand);
      color: #fff;
    }

    .legend-row {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 16px;
      padding: 14px 4px 2px;
      color: #5d5d5d;
      font-size: 0.94rem;
    }

    .legend-item {
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }

    .legend-dot {
      width: 14px;
      height: 14px;
      border-radius: 50%;
      display: inline-block;
      background: var(--success);
      box-shadow: inset 0 1px 1px rgba(255, 255, 255, 0.5);
    }

    .legend-dot.is-sold-out {
      background: var(--danger);
    }

    .stats-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 14px 4px 4px;
      color: #5b5b5b;
      font-size: 0.95rem;
    }

    .cards {
      display: grid;
      gap: 18px;
      margin-top: 18px;
    }

    .event-card {
      background: var(--surface);
      border: 2px solid rgba(45, 45, 45, 0.18);
      border-radius: 26px;
      box-shadow: var(--card-shadow);
      padding: 22px 18px 16px;
      display: grid;
      gap: 18px;
      grid-template-columns: minmax(0, 1fr) auto;
    }

    .card-main {
      min-width: 0;
    }

    .event-title {
      margin: 0 0 14px;
      font-size: clamp(1.5rem, 2.5vw, 2.2rem);
      line-height: 1.04;
      letter-spacing: -0.04em;
      font-weight: 800;
    }

    .meta-list {
      display: grid;
      gap: 8px;
      margin-bottom: 14px;
    }

    .meta-row {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      color: #575757;
      font-size: 1rem;
      line-height: 1.35;
    }

    .meta-icon {
      width: 20px;
      height: 20px;
      flex: 0 0 auto;
      color: #b6b6b6;
      margin-top: 1px;
    }

    .artist-line,
    .intro-line {
      margin: 0 0 8px;
      color: #575757;
      font-size: 0.98rem;
      line-height: 1.5;
    }

    .card-side {
      min-width: 150px;
      display: flex;
      justify-content: flex-end;
      align-items: flex-start;
    }

    .price-box {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      margin-top: 20px;
      white-space: nowrap;
    }

    .price-prefix {
      padding-top: 13px;
      color: #4d4d4d;
      font-size: 0.95rem;
    }

    .price-main {
      color: var(--brand);
      font-weight: 900;
      font-size: clamp(2rem, 3vw, 3rem);
      line-height: 0.95;
      letter-spacing: -0.05em;
    }

    .card-footer {
      grid-column: 1 / -1;
      display: grid;
      gap: 12px;
    }

    .tag-list {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .tag {
      border-radius: 999px;
      background: var(--tag);
      color: #fff;
      font-size: 0.86rem;
      line-height: 1;
      padding: 6px 12px;
    }

    .source-list {
      display: grid;
      gap: 10px;
      justify-content: end;
    }

    .source-pill {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      min-width: min(100%, 560px);
      max-width: 100%;
      padding: 8px 14px 8px 8px;
      border: 2px solid rgba(45, 45, 45, 0.28);
      border-radius: 999px;
      background: #fff;
      color: #585858;
      text-decoration: none;
    }

    .source-status {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      flex: 0 0 auto;
      background: var(--success);
      box-shadow: inset 0 2px 1px rgba(255, 255, 255, 0.55);
    }

    .source-status.is-unavailable {
      background: var(--danger);
    }

    .source-name {
      flex: 1 1 auto;
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-size: 0.96rem;
    }

    .source-price {
      white-space: nowrap;
      color: #5d5d5d;
      font-size: 0.94rem;
    }

    .empty-state {
      background: rgba(255, 255, 255, 0.96);
      border: 2px dashed rgba(45, 45, 45, 0.18);
      border-radius: 26px;
      padding: 42px 24px;
      text-align: center;
      box-shadow: var(--card-shadow);
      color: #5a5a5a;
    }

    .empty-state h2 {
      margin: 0 0 10px;
      font-size: 1.7rem;
      letter-spacing: -0.04em;
    }

    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      border: 0;
    }

    @media (max-width: 900px) {
      .hero-inner {
        flex-direction: column;
        align-items: flex-start;
        padding: 34px 18px 64px;
      }

      .search-bar {
        width: 100%;
        flex-basis: auto;
      }

      .toolbar {
        padding: 20px 16px 18px;
      }

      .filters-row {
        grid-template-columns: 1fr;
        gap: 16px;
      }

      .date-strip {
        grid-template-columns: auto auto 1fr auto;
      }

      .calendar-button,
      .browse-all-button {
        min-width: auto;
        padding: 18px 14px;
      }

      .date-track {
        grid-auto-columns: 116px;
      }

      .event-card {
        grid-template-columns: 1fr;
      }

      .card-side {
        justify-content: flex-start;
      }

      .price-box {
        margin-top: 0;
      }

      .source-list {
        justify-content: stretch;
      }
    }

    @media (max-width: 640px) {
      .content-wrap {
        padding: 0 10px 28px;
      }

      .hero-inner {
        padding: 24px 14px 56px;
      }

      .brand {
        font-size: 3.3rem;
      }

      .search-input {
        padding: 14px 16px;
        font-size: 0.96rem;
      }

      .search-button {
        padding: 11px 18px;
      }

      .multi-select-trigger {
        min-height: 68px;
        padding-right: 54px;
      }

      .multi-select-placeholder {
        font-size: 1rem;
      }

      .calendar-button,
      .browse-all-button {
        gap: 10px;
      }

      .calendar-button span {
        font-size: 0.85rem;
      }

      .date-nav {
        width: 42px;
      }

      .date-track {
        grid-auto-columns: 104px;
      }

      .date-pill {
        min-height: 102px;
        padding: 14px 8px;
      }

      .date-pill .weekday {
        font-size: 0.88rem;
      }

      .date-pill .day-text {
        font-size: 1rem;
      }

      .event-card {
        padding: 18px 14px 14px;
      }

      .event-title {
        font-size: 1.85rem;
      }

      .source-pill {
        width: 100%;
        min-width: 0;
      }

      .stats-row {
        flex-direction: column;
        align-items: flex-start;
      }
    }
  </style>
</head>
<body>
  <div class="page-shell">
    <header class="hero">
      <div class="hero-inner">
        <h1 class="brand">SG Events</h1>
        <form class="search-bar" id="searchForm">
          <label class="sr-only" for="searchInput">Search events</label>
          <input id="searchInput" class="search-input" type="search" placeholder="Event name / Artist / ..." autocomplete="off">
          <button class="search-button" type="submit">Search</button>
        </form>
      </div>
    </header>

    <main class="content-wrap">
      <section class="toolbar" aria-label="Filters">
        <div class="filters-row">
          <div class="multi-select" id="categoryFilter">
            <button class="multi-select-trigger" type="button" aria-haspopup="listbox" aria-expanded="false">
              <span class="multi-select-placeholder">Categories</span>
            </button>
            <div class="multi-select-panel">
              <div class="option-list" role="listbox" aria-multiselectable="true"></div>
            </div>
          </div>

          <div class="multi-select" id="venueFilter">
            <button class="multi-select-trigger" type="button" aria-haspopup="listbox" aria-expanded="false">
              <span class="multi-select-placeholder">Venues</span>
            </button>
            <div class="multi-select-panel">
              <div class="option-list" role="listbox" aria-multiselectable="true"></div>
            </div>
          </div>
        </div>

        <div class="date-strip">
          <button id="datePickerButton" class="calendar-button" type="button">
            <svg class="calendar-icon" viewBox="0 0 64 64" fill="none" aria-hidden="true">
              <rect x="11" y="14" width="42" height="40" rx="6" stroke="currentColor" stroke-width="4"></rect>
              <path d="M11 24H53" stroke="currentColor" stroke-width="4"></path>
              <path d="M22 8V20" stroke="currentColor" stroke-width="4" stroke-linecap="round"></path>
              <path d="M42 8V20" stroke="currentColor" stroke-width="4" stroke-linecap="round"></path>
            </svg>
            <span>Select<br>Date</span>
          </button>
          <button id="browseAllButton" class="browse-all-button active" type="button">Browse All</button>
          <input id="datePicker" class="sr-only" type="date">
          <button id="prevDates" class="date-nav" type="button" aria-label="Previous dates">&#8249;</button>
          <div id="dateTrack" class="date-track" aria-label="Date selection"></div>
          <button id="nextDates" class="date-nav" type="button" aria-label="Next dates">&#8250;</button>
        </div>

        <div class="legend-row">
          <span class="legend-item"><span class="legend-dot"></span> available</span>
          <span class="legend-item"><span class="legend-dot is-sold-out"></span> sold out</span>
        </div>

        <div class="stats-row">
          <div id="resultSummary">Loading events...</div>
          <div id="selectedDateLabel"></div>
        </div>
      </section>

      <section id="cards" class="cards" aria-live="polite"></section>
    </main>
  </div>

  <script src="./events-data.js"></script>
  <script>
    (() => {
      const rawEvents = Array.isArray(window.SG_EVENTS_DATA) ? window.SG_EVENTS_DATA : [];
      const monthMap = {
        Jan: 0,
        Feb: 1,
        Mar: 2,
        Apr: 3,
        May: 4,
        Jun: 5,
        Jul: 6,
        Aug: 7,
        Sep: 8,
        Oct: 9,
        Nov: 10,
        Dec: 11
      };

      const allDatesKey = "__all__";

      const state = {
        selectedDateKey: allDatesKey,
        categories: [],
        venues: [],
        query: ""
      };

      const elements = {
        cards: document.getElementById("cards"),
        resultSummary: document.getElementById("resultSummary"),
        selectedDateLabel: document.getElementById("selectedDateLabel"),
        searchInput: document.getElementById("searchInput"),
        searchForm: document.getElementById("searchForm"),
        dateTrack: document.getElementById("dateTrack"),
        prevDates: document.getElementById("prevDates"),
        nextDates: document.getElementById("nextDates"),
        browseAllButton: document.getElementById("browseAllButton"),
        datePickerButton: document.getElementById("datePickerButton"),
        datePicker: document.getElementById("datePicker"),
        filters: {
          category: document.getElementById("categoryFilter"),
          venue: document.getElementById("venueFilter")
        }
      };

      const sanitizeText = (value) => String(value ?? "").replace(/\s+/g, " ").trim();

      const escapeHtml = (value) => String(value)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/\"/g, "&quot;")
        .replace(/'/g, "&#39;");

      const escapeAttribute = (value) => escapeHtml(value || "#");

      const parseEventDate = (source) => {
        const value = sanitizeText(source);
        const match = value.match(/^(\d{2})-([A-Za-z]{3})-(\d{4}) \(([^)]+)\) (\d{2}:\d{2})$/);
        if (!match) {
          return null;
        }

        const [, day, monthAbbr, year, weekday, time] = match;
        const monthIndex = monthMap[monthAbbr];
        if (monthIndex === undefined) {
          return null;
        }

        const date = new Date(Number(year), monthIndex, Number(day));
        return {
          key: `${year}-${String(monthIndex + 1).padStart(2, "0")}-${day}`,
          display: `${day}-${monthAbbr}-${year} (${weekday}) ${time}`,
          weekday,
          dayNumber: day,
          monthAbbr,
          year,
          time,
          date
        };
      };

      const buildArtistOrganizerLine = (event) => {
        if (event.artist && event.organizer) {
          return `${event.artist} / ${event.organizer}`;
        }
        return event.artist || event.organizer || "";
      };

      const formatMoney = (amount) => `S$${Math.max(0, Number(amount) || 0)}`;

      const eventSummaries = rawEvents
        .map((item, eventIndex) => {
          const categories = Array.isArray(item.category)
            ? item.category.map(sanitizeText).filter(Boolean)
            : [];
          const sources = Array.isArray(item.sources)
            ? item.sources.map((source, sourceIndex) => ({
                id: `source-${eventIndex + 1}-${sourceIndex + 1}`,
                name: sanitizeText(source["source name"]) || "Source",
                url: sanitizeText(source["source url"]) || "#",
                ticketUrl: sanitizeText(source["ticket url"]) || sanitizeText(source["source url"]) || "#",
                ticketOpen: String(source["ticket status"]).toLowerCase() === "true",
                priceMin: Number.isFinite(Number(source["prince min"])) ? Number(source["prince min"]) : 0
              }))
            : [];
          const originalPriceMin = Number.isFinite(Number(item["original price min"])) ? Number(item["original price min"]) : 0;
          const firstDateText = sanitizeText(item["First-Day-Month-Year (day of the week)"]);
          const lastDateText = sanitizeText(item["Last-Day-Month-Year (day of the week)"]);
          const firstDateInfo = firstDateText
            ? parseEventDate(`${firstDateText} 00:00`)
            : null;

          const searchFragments = [
            item["Event name"],
            item["Artist"],
            item["Organizer"],
            item["Venue"],
            ...(Array.isArray(item.category) ? item.category : []),
            ...sources.flatMap((source) => [source.name, source.url])
          ];

          return {
            id: `event-${eventIndex + 1}`,
            title: sanitizeText(item["Event name"]) || "Untitled event",
            venue: sanitizeText(item["Venue"]) || "Venue TBC",
            artist: sanitizeText(item["Artist"]),
            organizer: sanitizeText(item["Organizer"]),
            introduction: sanitizeText(item["Event introduction"]),
            categories,
            sources,
            originalPriceMin,
            firstDateInfo,
            firstDateText,
            lastDateText,
            dateTextForAll: firstDateText && lastDateText
              ? `${firstDateText} ~ ${lastDateText}`
              : firstDateText || lastDateText || "",
            searchText: searchFragments.map(sanitizeText).join(" ").toLowerCase(),
            showtimes: Array.isArray(item.showtimes) ? item.showtimes : []
          };
        })
        .sort((a, b) => {
          const timeA = a.firstDateInfo?.date?.getTime?.() ?? Number.MAX_SAFE_INTEGER;
          const timeB = b.firstDateInfo?.date?.getTime?.() ?? Number.MAX_SAFE_INTEGER;
          return timeA - timeB || a.title.localeCompare(b.title);
        });

      const normalizedEvents = eventSummaries
        .flatMap((item, eventIndex) => {
          return item.showtimes
            .map((showtime, showtimeIndex) => {
              const dateInfo = parseEventDate(showtime["Day-Month-Year (day of the week) hour: minute"]);
              if (!dateInfo) {
                return null;
              }

              return {
                id: `${item.id}-showtime-${showtimeIndex + 1}`,
                title: item.title,
                venue: item.venue,
                artist: item.artist,
                organizer: item.organizer,
                introduction: item.introduction,
                categories: item.categories,
                sources: item.sources,
                originalPriceMin: item.originalPriceMin,
                dateInfo,
                dateText: dateInfo.display,
                searchText: item.searchText
              };
            })
            .filter(Boolean);
        })
        .sort((a, b) => a.dateInfo.date - b.dateInfo.date || a.dateInfo.time.localeCompare(b.dateInfo.time) || a.title.localeCompare(b.title));

      const uniqueDates = [...new Map(normalizedEvents.map((event) => [event.dateInfo.key, event.dateInfo])).values()];

      const countOccurrences = (values) => {
        const counts = new Map();
        values.forEach((value) => {
          if (!value) {
            return;
          }
          counts.set(value, (counts.get(value) || 0) + 1);
        });
        return [...counts.entries()]
          .map(([label, count]) => ({ label, count }))
          .sort((a, b) => b.count - a.count || a.label.localeCompare(b.label));
      };

      const categoryOptions = countOccurrences(eventSummaries.flatMap((event) => event.categories));
      const venueOptions = countOccurrences(eventSummaries.map((event) => event.venue));

      state.selectedDateKey = allDatesKey;

      const getSelectedSet = (filterName) => new Set(filterName === "category" ? state.categories : state.venues);

      const setSelectedValues = (filterName, values) => {
        if (filterName === "category") {
          state.categories = values;
        } else {
          state.venues = values;
        }
      };

      const renderMultiSelectTrigger = (filterName, options) => {
        const root = elements.filters[filterName];
        const trigger = root.querySelector(".multi-select-trigger");
        const placeholder = filterName === "category" ? "Categories" : "Venues";
        const selected = filterName === "category" ? state.categories : state.venues;

        trigger.innerHTML = "";

        if (!selected.length) {
          const span = document.createElement("span");
          span.className = "multi-select-placeholder";
          span.textContent = placeholder;
          trigger.appendChild(span);
          return;
        }

        selected.forEach((value) => {
          const chip = document.createElement("span");
          chip.className = "selected-chip";
          chip.innerHTML = `<span>${escapeHtml(value)}</span>`;

          const removeButton = document.createElement("button");
          removeButton.type = "button";
          removeButton.setAttribute("aria-label", `Remove ${value}`);
          removeButton.textContent = "x";
          removeButton.addEventListener("click", (event) => {
            event.stopPropagation();
            toggleFilterValue(filterName, value);
          });

          chip.appendChild(removeButton);
          trigger.appendChild(chip);
        });
      };

      const renderMultiSelectOptions = (filterName, options) => {
        const root = elements.filters[filterName];
        const list = root.querySelector(".option-list");
        const selected = getSelectedSet(filterName);
        list.innerHTML = "";

        options.forEach((option) => {
          const label = document.createElement("label");
          label.className = "option-item";
          label.innerHTML = `
            <input type="checkbox" ${selected.has(option.label) ? "checked" : ""}>
            <span class="option-label">${escapeHtml(option.label)}</span>
            <span class="option-count">${option.count}</span>
          `;

          const input = label.querySelector("input");
          input.addEventListener("change", () => {
            toggleFilterValue(filterName, option.label);
          });

          list.appendChild(label);
        });
      };

      const renderMultiSelect = (filterName, options) => {
        renderMultiSelectTrigger(filterName, options);
        renderMultiSelectOptions(filterName, options);
      };

      const toggleFilterValue = (filterName, value) => {
        const selected = getSelectedSet(filterName);
        if (selected.has(value)) {
          selected.delete(value);
        } else {
          selected.add(value);
        }
        setSelectedValues(filterName, [...selected]);
        renderMultiSelect(filterName, filterName === "category" ? categoryOptions : venueOptions);
        render();
      };

      const closeAllDropdowns = (exceptName = "") => {
        Object.entries(elements.filters).forEach(([name, root]) => {
          const shouldOpen = name === exceptName;
          root.classList.toggle("is-open", shouldOpen && !root.classList.contains("is-open"));
          root.querySelector(".multi-select-trigger").setAttribute("aria-expanded", String(root.classList.contains("is-open")));
        });
      };

      const updateActiveDateTrack = () => {
        elements.dateTrack.querySelectorAll(".date-pill").forEach((pill) => {
          pill.classList.toggle("active", pill.dataset.dateKey === state.selectedDateKey);
        });
        elements.browseAllButton.classList.toggle("active", state.selectedDateKey === allDatesKey);
      };

      const renderDateTrack = () => {
        elements.dateTrack.innerHTML = "";

        uniqueDates.forEach((dateInfo) => {
          const button = document.createElement("button");
          button.type = "button";
          button.className = `date-pill${dateInfo.key === state.selectedDateKey ? " active" : ""}`;
          button.dataset.dateKey = dateInfo.key;
          button.innerHTML = `
            <span class="weekday">${escapeHtml(dateInfo.weekday)}</span>
            <span class="day-text">${escapeHtml(`${dateInfo.dayNumber} ${dateInfo.monthAbbr}`)}</span>
          `;
          button.addEventListener("click", () => {
            state.selectedDateKey = dateInfo.key;
            syncDatePicker();
            render();
            scrollDateIntoView(dateInfo.key);
          });
          elements.dateTrack.appendChild(button);
        });

        syncDatePicker();
      };

      const syncDatePicker = () => {
        elements.datePicker.value = state.selectedDateKey === allDatesKey ? "" : (state.selectedDateKey || "");
      };

      const scrollDateTrackBy = (direction) => {
        const sample = elements.dateTrack.querySelector(".date-pill");
        const step = sample ? sample.getBoundingClientRect().width * 2.3 : 260;
        elements.dateTrack.scrollBy({ left: step * direction, behavior: "smooth" });
      };

      const scrollDateIntoView = (dateKey) => {
        const active = elements.dateTrack.querySelector(`[data-date-key="${dateKey}"]`);
        if (active) {
          active.scrollIntoView({ behavior: "smooth", inline: "center", block: "nearest" });
        }
      };

      const getFilteredEvents = () => {
        const sourceEvents = state.selectedDateKey === allDatesKey ? eventSummaries : normalizedEvents;

        return sourceEvents.filter((event) => {
          if (state.selectedDateKey && state.selectedDateKey !== allDatesKey && event.dateInfo.key !== state.selectedDateKey) {
            return false;
          }

          if (state.categories.length && !state.categories.some((category) => event.categories.includes(category))) {
            return false;
          }

          if (state.venues.length && !state.venues.includes(event.venue)) {
            return false;
          }

          if (state.query && !event.searchText.includes(state.query)) {
            return false;
          }

          return true;
        });
      };

      const buildSourcePills = (sources) => {
        if (!sources.length) {
          return "";
        }

        return `
          <div class="source-list">
            ${sources.map((source) => `
              <a class="source-pill" href="${escapeAttribute(source.ticketUrl)}" target="_blank" rel="noreferrer">
                <span class="source-status${source.ticketOpen ? "" : " is-unavailable"}"></span>
                <span class="source-name">${escapeHtml(source.name)}</span>
                <span class="source-price">from ${escapeHtml(formatMoney(source.priceMin))}</span>
              </a>
            `).join("")}
          </div>
        `;
      };

      const buildCard = (event) => {
        const article = document.createElement("article");
        article.className = "event-card";

        const artistOrganizerLine = buildArtistOrganizerLine(event);
        const tags = event.categories.map((category) => `<span class="tag">${escapeHtml(category)}</span>`).join("");
        const fallbackSourcePrice = event.sources.length
          ? Math.min(...event.sources.map((source) => source.priceMin))
          : 0;
        const displayPrice = event.originalPriceMin || fallbackSourcePrice;
        const dateText = state.selectedDateKey === allDatesKey
          ? (event.dateTextForAll || event.firstDateText || "")
          : event.dateText;

        article.innerHTML = `
          <div class="card-main">
            <h2 class="event-title">${escapeHtml(event.title)}</h2>
            <div class="meta-list">
              <div class="meta-row">
                <svg class="meta-icon" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                  <rect x="3.5" y="5.5" width="17" height="15" rx="2.5" stroke="currentColor" stroke-width="2"></rect>
                  <path d="M3.5 9.5H20.5" stroke="currentColor" stroke-width="2"></path>
                  <path d="M8 3V8" stroke="currentColor" stroke-width="2" stroke-linecap="round"></path>
                  <path d="M16 3V8" stroke="currentColor" stroke-width="2" stroke-linecap="round"></path>
                </svg>
                <span>${escapeHtml(dateText)}</span>
              </div>
              <div class="meta-row">
                <svg class="meta-icon" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                  <path d="M12 21C15.8 16.9 19 13.5 19 9.5A7 7 0 1 0 5 9.5C5 13.5 8.2 16.9 12 21Z" stroke="currentColor" stroke-width="2"></path>
                  <circle cx="12" cy="9.5" r="2.5" stroke="currentColor" stroke-width="2"></circle>
                </svg>
                <span>${escapeHtml(event.venue)}</span>
              </div>
            </div>
            ${artistOrganizerLine ? `<p class="artist-line">${escapeHtml(artistOrganizerLine)}</p>` : ""}
            ${event.introduction ? `<p class="intro-line">${escapeHtml(event.introduction)}</p>` : ""}
          </div>
          <div class="card-side">
            <div class="price-box">
              <span class="price-prefix">from</span>
              <span class="price-main">${escapeHtml(formatMoney(displayPrice))}</span>
            </div>
          </div>
          <div class="card-footer">
            <div class="tag-list">${tags}</div>
            ${buildSourcePills(event.sources)}
          </div>
        `;

        return article;
      };

      const renderCards = (filteredEvents) => {
        elements.cards.innerHTML = "";

        if (!filteredEvents.length) {
          const empty = document.createElement("div");
          empty.className = "empty-state";
          empty.innerHTML = `
            <h2>No events found</h2>
            <p>Try another date, category, venue, or search keyword.</p>
          `;
          elements.cards.appendChild(empty);
          return;
        }

        filteredEvents.forEach((event) => {
          elements.cards.appendChild(buildCard(event));
        });
      };

      const renderSummary = (filteredEvents) => {
        const selectedDate = uniqueDates.find((item) => item.key === state.selectedDateKey);
        const summaryParts = [`${filteredEvents.length} event${filteredEvents.length === 1 ? "" : "s"}`];

        if (state.categories.length) {
          summaryParts.push(state.categories.join(", "));
        }

        if (state.venues.length) {
          summaryParts.push(state.venues.join(", "));
        }

        if (state.query) {
          summaryParts.push(`matching "${state.query}"`);
        }

        elements.resultSummary.textContent = summaryParts.join(" · ");
        elements.selectedDateLabel.textContent = selectedDate
          ? `${selectedDate.weekday}, ${selectedDate.dayNumber} ${selectedDate.monthAbbr} ${selectedDate.year}`
          : "All dates";
      };

      const render = () => {
        updateActiveDateTrack();
        const filteredEvents = getFilteredEvents();
        renderSummary(filteredEvents);
        renderCards(filteredEvents);
      };

      const bindMultiSelects = () => {
        Object.entries(elements.filters).forEach(([filterName, root]) => {
          const trigger = root.querySelector(".multi-select-trigger");
          trigger.addEventListener("click", (event) => {
            event.stopPropagation();
            const isOpen = root.classList.contains("is-open");
            Object.entries(elements.filters).forEach(([name, otherRoot]) => {
              otherRoot.classList.remove("is-open");
              otherRoot.querySelector(".multi-select-trigger").setAttribute("aria-expanded", "false");
            });
            if (!isOpen) {
              root.classList.add("is-open");
              trigger.setAttribute("aria-expanded", "true");
            }
          });
        });

        document.addEventListener("click", (event) => {
          if (!event.target.closest(".multi-select")) {
            Object.values(elements.filters).forEach((root) => {
              root.classList.remove("is-open");
              root.querySelector(".multi-select-trigger").setAttribute("aria-expanded", "false");
            });
          }
        });
      };

      const bindEvents = () => {
        bindMultiSelects();

        elements.searchForm.addEventListener("submit", (event) => {
          event.preventDefault();
          state.query = sanitizeText(elements.searchInput.value).toLowerCase();
          render();
        });

        elements.searchInput.addEventListener("search", () => {
          state.query = sanitizeText(elements.searchInput.value).toLowerCase();
          render();
        });

        elements.prevDates.addEventListener("click", () => {
          scrollDateTrackBy(-1);
        });

        elements.nextDates.addEventListener("click", () => {
          scrollDateTrackBy(1);
        });

        elements.datePickerButton.addEventListener("click", () => {
          elements.datePicker.showPicker?.();
          elements.datePicker.click();
        });

        elements.browseAllButton.addEventListener("click", () => {
          state.selectedDateKey = allDatesKey;
          syncDatePicker();
          render();
        });

        elements.datePicker.addEventListener("change", (event) => {
          const picked = event.target.value;
          if (!picked) {
            state.selectedDateKey = allDatesKey;
            render();
            scrollDateIntoView(allDatesKey);
            return;
          }

          state.selectedDateKey = picked;
          render();
          scrollDateIntoView(picked);
        });
      };

      renderMultiSelect("category", categoryOptions);
      renderMultiSelect("venue", venueOptions);
      renderDateTrack();
      bindEvents();
      render();
      elements.dateTrack.scrollLeft = 0;
    })();
  </script>
</body>
</html>
